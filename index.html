<!doctype html>
<html lang="en" class="theme-dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>rebar.bot</title>
<meta name="description" content="An interactive little robot, brought to you by Rebar." />
<meta name="theme-color" content="#101820" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --black: #101820;
    --black-2: #1a242e;
    --line: #2a3440;
    --off-white: #fafafa;
    --teal: #40a6ab;
    --red: #df2927;
    --navy: #004761;
    --muted: #9aa5b1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--black);
    color: var(--off-white);
    font-family: 'Saira', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
    overflow: hidden;
    display: grid;
    place-items: center;
    min-height: 100svh;
    position: relative;
    cursor: default;
  }
  /* blueprint grid + vignette */
  .bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 44px 44px;
    opacity: .35;
    mask-image: radial-gradient(circle at center, #000 0%, transparent 78%);
    -webkit-mask-image: radial-gradient(circle at center, #000 0%, transparent 78%);
  }
  /* cursor-following glow */
  .glow {
    position: fixed; left: 0; top: 0; z-index: 0; pointer-events: none;
    width: 60vmax; height: 60vmax;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(64,166,171,.16) 0%, rgba(64,166,171,0) 60%);
    transition: opacity .4s ease;
    opacity: 0;
  }
  .stage {
    position: relative; z-index: 1;
    perspective: 1100px;
    display: grid; place-items: center;
  }
  .bot {
    width: clamp(240px, 58vmin, 600px);
    height: auto;
    color: var(--off-white);
    display: block;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    animation: float 6s ease-in-out infinite;
    filter: drop-shadow(0 0 0 rgba(64,166,171,0)) drop-shadow(0 18px 40px rgba(0,0,0,.55));
    transition: filter .35s ease;
  }
  .bot:hover { filter: drop-shadow(0 0 26px rgba(64,166,171,.45)) drop-shadow(0 18px 40px rgba(0,0,0,.55)); }
  @keyframes float {
    0%,100% { transform: translateY(-10px); }
    50%     { transform: translateY(10px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .bot { animation: none; }
  }
  .inner {
    transform-box: fill-box;
    transform-origin: 1000px 1100px;
    transition: transform .14s ease-out;
    will-change: transform;
  }
  .bot.boop .inner { animation: boop .42s cubic-bezier(.34,1.56,.64,1); }
  @keyframes boop {
    0%   { transform: scale(1,1); }
    28%  { transform: scale(1.07,.86); }
    55%  { transform: scale(.95,1.07); }
    100% { transform: scale(1,1); }
  }
  .eye-pivot { transition: transform .12s ease-out; will-change: transform; }
  .pupil {
    fill: currentColor;
    transform-box: fill-box;
    transform-origin: center;
  }
  .eye.blink .pupil { animation: blink .16s ease-in-out; }
  @keyframes blink {
    0%,100% { transform: scaleY(1); }
    50%     { transform: scaleY(.08); }
  }
  /* antenna ball glow */
  .antenna-glow {
    fill: var(--teal);
    filter: blur(14px);
    opacity: .0;
    transform-box: fill-box;
    transform-origin: center;
    animation: pulse 3.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: .25; transform: scale(.9); }
    50%     { opacity: .7;  transform: scale(1.25); }
  }
  .bot.boop .antenna-glow { fill: var(--red); }
  /* ripple ring from antenna on boop */
  .ripple {
    fill: none; stroke: var(--teal); stroke-width: 8;
    transform-box: fill-box; transform-origin: center;
    opacity: 0;
  }
  .bot.boop .ripple { animation: ripple .55s ease-out; }
  @keyframes ripple {
    0%   { opacity: .8; transform: scale(.4); }
    100% { opacity: 0;  transform: scale(3.2); }
  }
  /* minimal link back */
  .home {
    position: fixed; z-index: 2; left: 50%; bottom: clamp(20px, 5vh, 48px);
    transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: .45em;
    color: var(--muted); text-decoration: none;
    font-size: clamp(13px, 1.6vmin, 16px);
    letter-spacing: .14em; text-transform: lowercase; font-weight: 600;
    padding: .5em .2em;
    transition: color .25s ease, letter-spacing .25s ease;
  }
  .home:hover { color: var(--off-white); letter-spacing: .22em; }
  .home .arrow { transition: transform .25s ease; }
  .home:hover .arrow { transform: translate(2px,-2px); }
  .hint {
    position: fixed; z-index: 2; left: 50%; top: clamp(18px, 5vh, 44px);
    transform: translateX(-50%);
    color: var(--line); font-size: 12px; letter-spacing: .3em; text-transform: uppercase;
    transition: opacity .6s ease; opacity: 1;
  }
  .hint.gone { opacity: 0; }
</style>
</head>

<script>
(() => {
  const bot   = document.getElementById('bot');
  const inner = document.getElementById('inner');
  const glow  = document.getElementById('glow');
  const hint  = document.getElementById('hint');
  const botlink = document.getElementById('botlink');
  const pivotL = document.querySelector('#eyeL .eye-pivot');
  const pivotR = document.querySelector('#eyeR .eye-pivot');
  const eyeL = document.getElementById('eyeL');
  const eyeR = document.getElementById('eyeR');
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  const EYE_MAX = 30;     // max pupil travel in viewBox units
  const TILT_MAX = 13;    // max degrees
  let idleTimer, wanderTimer, navTimer;
  let interacting = false;

  function look(nx, ny) {
    // nx, ny in [-1, 1]
    const ex = Math.max(-1, Math.min(1, nx)) * EYE_MAX;
    const ey = Math.max(-1, Math.min(1, ny)) * EYE_MAX;
    pivotL.style.transform = `translate(${ex}px, ${ey}px)`;
    pivotR.style.transform = `translate(${ex}px, ${ey}px)`;
    inner.style.transform  = `rotateY(${nx * TILT_MAX}deg) rotateX(${ -ny * TILT_MAX}deg)`;
  }

  function center() { look(0, 0); }

  function onMove(clientX, clientY) {
    const cx = innerWidth / 2, cy = innerHeight / 2;
    const nx = (clientX - cx) / cx;
    const ny = (clientY - cy) / cy;
    look(nx, ny);
    glow.style.opacity = '1';
    glow.style.transform = `translate(${clientX}px, ${clientY}px) translate(-50%, -50%)`;
    hint.classList.add('gone');
    interacting = true;
    clearTimeout(idleTimer);
    clearTimeout(wanderTimer);
    idleTimer = setTimeout(startWander, 2600);
  }

  // idle wandering — bot looks around on its own
  function startWander() {
    interacting = false;
    glow.style.opacity = '0';
    const step = () => {
      if (interacting) return;
      look((Math.random() * 2 - 1) * 0.7, (Math.random() * 2 - 1) * 0.6);
      wanderTimer = setTimeout(() => {
        if (interacting) return;
        center();
        wanderTimer = setTimeout(step, 900 + Math.random() * 1400);
      }, 1100 + Math.random() * 900);
    };
    step();
  }

  // blinking
  function blink() {
    eyeL.classList.add('blink'); eyeR.classList.add('blink');
    setTimeout(() => { eyeL.classList.remove('blink'); eyeR.classList.remove('blink'); }, 170);
  }
  function scheduleBlink() {
    setTimeout(() => { if (!reduce) blink(); scheduleBlink(); }, 2600 + Math.random() * 3800);
  }

  // boop on click, then go home
  function boop() {
    bot.classList.remove('boop'); void bot.offsetWidth; bot.classList.add('boop');
    blink();
    setTimeout(() => bot.classList.remove('boop'), 460);
  }

  botlink.addEventListener('click', (e) => {
    e.preventDefault();
    if (navTimer) return;
    boop();
    navTimer = setTimeout(() => { location.href = 'https://rebar.is'; }, 360);
  });

  window.addEventListener('pointermove', (e) => onMove(e.clientX, e.clientY), { passive: true });
  window.addEventListener('pointerleave', () => { center(); glow.style.opacity = '0'; });

  // device tilt on mobile (no-permission path; works where allowed)
  window.addEventListener('deviceorientation', (e) => {
    if (e.gamma == null || interacting) return;
    look(Math.max(-1, Math.min(1, e.gamma / 35)), Math.max(-1, Math.min(1, (e.beta - 40) / 35)));
  }, { passive: true });

  scheduleBlink();
  idleTimer = setTimeout(startWander, 2600);
})();
</script>
</body>
</html>
